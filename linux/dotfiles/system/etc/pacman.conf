# https://gitlab.archlinux.org/archlinux/packaging/packages/pacman/-/raw/main/pacman.conf

[options]
Architecture = x86_64
DownloadUser = alpm
HoldPkg = pacman glibc
# HoldPkg = pacman glibc dracut kernel-install-for-dracut eos-dracut
LocalFileSigLevel = Optional
ParallelDownloads = 10
SigLevel = Required DatabaseOptional

CheckSpace
Color
ILoveCandy
VerbosePkgLists

[core]
# Include = /etc/pacman.d/mirrorlist
Server = https://fastly.mirror.pkgbuild.com/$repo/os/$arch
Server = https://geo.mirror.pkgbuild.com/$repo/os/$arch
Server = https://ftpmirror.infania.net/mirror/archlinux/$repo/os/$arch
Server = http://mirror.rackspace.com/archlinux/$repo/os/$arch
Server = https://mirror.rackspace.com/archlinux/$repo/os/$arch

[extra]
# Include = /etc/pacman.d/mirrorlist
Server = https://fastly.mirror.pkgbuild.com/$repo/os/$arch
Server = https://geo.mirror.pkgbuild.com/$repo/os/$arch
Server = https://ftpmirror.infania.net/mirror/archlinux/$repo/os/$arch
Server = http://mirror.rackspace.com/archlinux/$repo/os/$arch
Server = https://mirror.rackspace.com/archlinux/$repo/os/$arch

[multilib]
# Include = /etc/pacman.d/mirrorlist
Server = https://fastly.mirror.pkgbuild.com/$repo/os/$arch
Server = https://geo.mirror.pkgbuild.com/$repo/os/$arch
Server = https://ftpmirror.infania.net/mirror/archlinux/$repo/os/$arch
Server = http://mirror.rackspace.com/archlinux/$repo/os/$arch
Server = https://mirror.rackspace.com/archlinux/$repo/os/$arch

[endeavouros]
# Include = /etc/pacman.d/endeavouros-mirrorlist
SigLevel = PackageRequired
Server = https://mirrors.nxtgen.com/endeavouros-mirror/repo/$repo/$arch
Server = https://mirror.albony.in/endeavouros/repo/$repo/$arch
Server = https://mirror.freedif.org/EndeavourOS/repo/$repo/$arch
Server = https://mirror.jingk.ai/endeavouros/repo/$repo/$arch
Server = https://mirror.funami.tech/endeavouros/repo/$repo/$arch

