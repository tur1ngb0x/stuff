[colors]
draw_bold_text_with_bright_colors = true

[cursor]
blink_interval = 500
thickness = 0.10

[cursor.style]
blinking = "On"
shape = "Underline"

[env]
TERM = 'xterm-256color'

[font]
size = 15

[font.normal]
family = "Adwaita Mono"
style = "Regular"

[font.offset]
x = 0
y = 0

[scrolling]
multiplier = 5

[selection]
save_to_clipboard = true

[terminal.shell]
program = "bash"
#args = ["--rcfile", "/home/user/.config/bash/config"]
#program = "fish"
#program = "zsh"
#program = "pwsh"
#program = "nu"

[window]
decorations_theme_variant = "Dark"
dynamic_padding = true
dynamic_title = true
level = "AlwaysOnTop"
opacity = 1.0
startup_mode = "Maximized"

[window.padding]
x = 10
y = 10

#######################################################################################################################
# KEYBOARD
#######################################################################################################################
[[keyboard.bindings]]
action = "SpawnNewInstance"
key = "Return"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "ToggleFullscreen"
key = "F11"
mods = "None"

[[keyboard.bindings]]
action = "ScrollPageUp"
key = "PageUp"
mods = "Control"

[[keyboard.bindings]]
action = "ScrollPageDown"
key = "PageDown"
mods = "Control"

#######################################################################################################################
# MOUSE
#######################################################################################################################
[mouse]
hide_when_typing = true

[[mouse.bindings]]
action = "Paste"
mouse = "Right"

[[mouse.bindings]]
action = "Paste"
mouse = "Middle"

[[mouse.bindings]]
action = "IncreaseFontSize"
mods = "Control"
mouse = "WheelUp"

[[mouse.bindings]]
action = "DecreaseFontSize"
mods = "Control"
mouse = "WheelDown"

#######################################################################################################################
# COLORS - xterm
#######################################################################################################################
[colors.primary]
background = '#000000'        # black background (0% white)
dim_foreground = '#555555'    # dim foreground (~33% white)
foreground = '#aaaaaa'        # normal foreground (~67% white)
bright_foreground = '#ffffff' # bright foreground (100% white)

[colors.normal]
black   = '#000000'
red     = '#cd0000'
green   = '#00cd00'
yellow  = '#cdcd00'
blue    = '#0000ee'
magenta = '#cd00cd'
cyan    = '#00cdcd'
white   = '#e5e5e5'

[colors.bright]
black   = '#7f7f7f'
red     = '#ff0000'
green   = '#00ff00'
yellow  = '#ffff00'
blue    = '#5c5cff'
magenta = '#ff00ff'
cyan    = '#00ffff'
white   = '#ffffff'
