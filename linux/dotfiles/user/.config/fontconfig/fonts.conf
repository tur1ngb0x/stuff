<fontconfig>

    <!-- Replacement Serif -->
    <match target="pattern"><test name="family" compare="eq"><string>FreeSerif</string></test><edit name="family" mode="assign_replace"><string>Liberation Serif</string></edit></match>
    <match target="pattern"><test name="family" compare="eq"><string>Nimbus Roman</string></test><edit name="family" mode="assign_replace"><string>Liberation Serif</string></edit></match>
    <match target="pattern"><test name="family" compare="eq"><string>Noto Serif</string></test><edit name="family" mode="assign_replace"><string>Liberation Serif</string></edit></match>

    <!-- Replacement Sans -->
    <match target="pattern"><test name="family" compare="eq"><string>Cantarell</string></test><edit name="family" mode="assign_replace"><string>Liberation Sans</string></edit></match>
    <match target="pattern"><test name="family" compare="eq"><string>Droid Sans</string></test><edit name="family" mode="assign_replace"><string>Liberation Sans</string></edit></match>
    <match target="pattern"><test name="family" compare="eq"><string>FreeSans</string></test><edit name="family" mode="assign_replace"><string>Liberation Sans</string></edit></match>
    <match target="pattern"><test name="family" compare="eq"><string>Nimbus Sans</string></test><edit name="family" mode="assign_replace"><string>Liberation Sans</string></edit></match>
    <match target="pattern"><test name="family" compare="eq"><string>Noto Sans</string></test><edit name="family" mode="assign_replace"><string>Liberation Sans</string></edit></match>
    <match target="pattern"><test name="family" compare="eq"><string>Open Sans</string></test><edit name="family" mode="assign_replace"><string>Liberation Sans</string></edit></match>
    <match target="pattern"><test name="family" compare="eq"><string>Ubuntu Condensed</string></test><edit name="family" mode="assign_replace"><string>Liberation Sans</string></edit></match>
    <match target="pattern"><test name="family" compare="eq"><string>Ubuntu Sans</string></test><edit name="family" mode="assign_replace"><string>Liberation Sans</string></edit></match>
    <match target="pattern"><test name="family" compare="eq"><string>Ubuntu</string></test><edit name="family" mode="assign_replace"><string>Liberation Sans</string></edit></match>

    <!-- Replacement Monospace -->
    <match target="pattern"><test name="family" compare="eq"><string>FreeMono</string></test><edit name="family" mode="assign_replace"><string>Liberation Mono</string></edit></match>
    <match target="pattern"><test name="family" compare="eq"><string>Nimbus Mono PS</string></test><edit name="family" mode="assign_replace"><string>Liberation Mono</string></edit></match>
    <match target="pattern"><test name="family" compare="eq"><string>Nimbus Mono</string></test><edit name="family" mode="assign_replace"><string>Liberation Mono</string></edit></match>
    <match target="pattern"><test name="family" compare="eq"><string>Noto Mono</string></test><edit name="family" mode="assign_replace"><string>Liberation Mono</string></edit></match>
    <match target="pattern"><test name="family" compare="eq"><string>Noto Sans Mono</string></test><edit name="family" mode="assign_replace"><string>Liberation Mono</string></edit></match>
    <match target="pattern"><test name="family" compare="eq"><string>Ubuntu Mono</string></test><edit name="family" mode="assign_replace"><string>Liberation Mono</string></edit></match>
    <match target="pattern"><test name="family" compare="eq"><string>Ubuntu Sans Mono</string></test><edit name="family" mode="assign_replace"><string>Liberation Mono</string></edit></match>

    <!-- Alias Serif -->
    <alias><family>serif</family><prefer><family>Liberation Serif</family><family>Symbols Nerd Font Mono</family></prefer></alias>

    <!-- Alias Sans -->
    <alias><family>sans</family><prefer><family>Liberation Sans</family><family>Symbols Nerd Font Mono</family></prefer></alias>

    <!-- Alias Sans-Serif -->
    <alias><family>sans-serif</family><prefer><family>Liberation Sans</family><family>Symbols Nerd Font Mono</family></prefer></alias>

    <!-- Alias Mono -->
    <alias><family>mono</family><prefer><family>Liberation Mono</family><family>Symbols Nerd Font Mono</family></prefer></alias>

    <!-- Alias Monospace -->
    <alias><family>monospace</family><prefer><family>Liberation Mono</family><family>Symbols Nerd Font Mono</family></prefer></alias>

    <match target="font">
        <edit name="antialias"      mode="assign">  <bool>true</bool>         </edit>
        <edit name="autohint"       mode="assign">  <bool>false</bool>        </edit>
        <edit name="dpi"            mode="assign">  <double>96</double>       </edit>
        <edit name="embeddedbitmap" mode="assign">  <bool>true</bool>         </edit>
        <edit name="hinting"        mode="assign">  <bool>true</bool>         </edit>
        <edit name="hintstyle"      mode="assign">  <const>hintslight</const> </edit>
        <edit name="lcdfilter"      mode="assign">  <const>lcddefault</const> </edit>
        <edit name="rgba"           mode="assign">  <const>rgb</const>        </edit>
    </match>

</fontconfig>

<!-- sudo install -v -D ./../user/.config/fontconfig/fonts.conf /etc/fonts/local.conf -->
<!-- install -v -D ./../user/.config/fontconfig/fonts.conf ~/.config/fontconfig/fonts.conf -->
